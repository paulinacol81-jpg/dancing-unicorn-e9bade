<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Menú Bebidas - La Reata de Oro</title>
  
  <style>
    :root{
      --max: 620px;
      --radius: 16px;
      --glass: rgba(0,0,0,.35);
      --border: rgba(255,255,255,.14);
      --text: #fff;
    }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color: var(--text);
      min-height:100vh;
      background: #0b0b0b;
      display:flex;
      justify-content:center;
      padding: 18px 14px 26px;
    }

    .wrap{
      width:100%;
      max-width: var(--max);
    }

    .topbar{
      display:flex;
      gap:10px;
      align-items:center;
      margin-bottom: 14px;
    }

    .back{
      text-decoration:none;
      color:#fff;
      padding:10px 12px;
      border-radius: 12px;
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    .title{
      margin:0;
      font-size: 18px;
      opacity:.95;
    }

    .card{
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(10px);
      padding: 14px;
    }

    .hint{
      margin: 0 0 10px;
      opacity:.85;
      font-size: 14px;
    }

    .cats{
      display:grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .catBtn{
      width:100%;
      text-align:left;
      padding: 14px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      color:#fff;
      font-size: 15px;
      cursor:pointer;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .catBtn .chev{
      opacity:.8;
      transform: rotate(0deg);
      transition: transform .15s ease;
    }

    .catBtn[aria-expanded="true"] .chev{
      transform: rotate(180deg);
    }

    .panel{
      display:none;
      margin-top: 10px;
      border-radius: 14px;
      overflow:hidden;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
    }

    .panel.show{ display:block; }

    .panel img{
      width:100%;
      display:block;
      height:auto;
    }

    .panel .cap{
      padding: 10px 12px;
      font-size: 13px;
      opacity:.9;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="topbar">
      <a class="back" href="index.html">← Regresar</a>
      <h1 class="title">Menú Bebidas</h1>
    </div>

   <div class="card">
      <p class="hint">Toca una categoría para ver su contenido.</p>

      <div class="cats">

        <!-- CATEGORÍA 1 -->
        
        <button class="catBtn" type="button" data-target="Cervezas" aria-expanded="false">
          Cervezas <span class="chev">⌄</span>
        </button>
        <div class="panel" id="Cervezas">
          <img src="img/Cervezas.jpeg" alt="Menú - Cervezas">
          <img src="img/cerveza_imagen2.png" alt="Menú - Cervezas">
          <div class="cap">Cervezas</div>
        </div>

        <!-- CATEGORÍA 2 -->
        <button class="catBtn" type="button" data-target="Vodka" aria-expanded="false">
          Vodka <span class="chev">⌄</span>
        </button>
        <div class="panel" id="Vodka">
          <img src="img/Vodkas.png" alt="Menú - Vodka">
          <img src="img/vodka_imagen.png" alt="Menú - Vodka">
          <div class="cap">Vodka</div>
        </div>

        <!-- CATEGORÍA 3 -->
        <button class="catBtn" type="button" data-target="Ron" aria-expanded="false">
          Ron <span class="chev">⌄</span>
        </button>
        <div class="panel" id="Ron">
          <img src="img/Rones.png" alt="Menú - Ron">
          <img src="img/ron_imagen.png" alt="Menú - Ron">
          <div class="cap">Ron</div>
        </div>

        <!-- CATEGORÍA 4 -->
        <button class="catBtn" type="button" data-target="Tequila" aria-expanded="false">
          Tequila <span class="chev">⌄</span>
        </button>
        <div class="panel" id="Tequila">
          <img src="img/Tequilas.png" alt="Menú - Tequila">
          <img src="img/tequila_imagen.png" alt="Menú - Tequila">
          <div class="cap">Tequila</div>
        </div>

        <!-- CATEGORÍA 5 -->
        <button class="catBtn" type="button" data-target="BrandysCognac" aria-expanded="false">
          Brandys y Cognac <span class="chev">⌄</span>
        </button>
        <div class="panel" id="BrandysCognac">
          <img src="img/Brandys.png" alt="Menú - Brandys y Cognac">
          <img src="img/brandy_imagen.png" alt="Menú - Brandys y Cognac">
          <div class="cap">Brandys y Cognac</div>
        </div>
     
       <!-- CATEGORÍA 6-->
        <button class="catBtn" type="button" data-target="Whisky" aria-expanded="false">
          Whisky <span class="chev">⌄</span>
        </button>
        <div class="panel" id="Whisky">
          <img src="img/Whisky.png" alt="Menú - Whisky">
          <img src="img/whisky_imagen.png" alt="Menú - Whisky">
          <div class="cap">Whisky</div>
        </div>

    
        <!-- CATEGORÍA 7 -->
        <button class="catBtn" type="button" data-target="Cocteleria con Alcohol" aria-expanded="false">
          Cocteleria con Alcohol <span class="chev">⌄</span>
        </button>
        <div class="panel" id="Cocteleria con Alcohol">
          <img src="img/cocteleria_con_alcohol.png" alt="Menú - Cocteleria con Alcohol">
          <div class="cap">Cocteleria con Alcohol</div>
        </div>

        <!-- CATEGORÍA 8 -->
        <button class="catBtn" type="button" data-target="Cocteleria sin Alcohol" aria-expanded="false">
          Cocteleria sin Alcohol <span class="chev">⌄</span>
        </button>
        <div class="panel" id="Cocteleria sin Alcohol">
          <img src="img/cocteleria_sin_alcohol.png" alt="Menú - Cocteleria sin Alcohol">
          <div class="cap">Cocteleria sin Alcohol</div>
        </div>
        
        <!-- CATEGORÍA 9 -->
        <button class="catBtn" type="button" data-target="Ginebra" aria-expanded="false">
          Ginebra <span class="chev">⌄</span>
        </button>
        <div class="panel" id="Ginebra">
          <img src="img/Ginebras.png" alt="Menú - Ginebra">
          <div class="cap">Ginebra</div>
        </div>
        
        <!-- CATEGORÍA 10 -->
        <button class="catBtn" type="button" data-target="Anis" aria-expanded="false">
          Anis <span class="chev">⌄</span>
        </button>
        <div class="panel" id="Anis">
          <img src="img/anis.png" alt="Menú - Anis">
          <div class="cap">Anis</div>
        </div>
        
        <!-- CATEGORÍA 11 -->
        <button class="catBtn" type="button" data-target="Licores" aria-expanded="false">
          Licores <span class="chev">⌄</span>
        </button>
        <div class="panel" id="Licores">
          <img src="img/Licores.png" alt="Menú - Licores">
          <div class="cap">Licores</div>
        </div>
        
        <!-- CATEGORÍA 12 -->
        <button class="catBtn" type="button" data-target="Mezcal" aria-expanded="false">
          Mezcal <span class="chev">⌄</span>
        </button>
        <div class="panel" id="Mezcal">
          <img src="img/Mezcal.png" alt="Menú - Mezcal">
          <div class="cap">Mezcal</div>
        </div>
        
    </div>
  </div>
 </div>
  <script>
    const buttons = document.querySelectorAll(".catBtn");

    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.dataset.target;
        const panel = document.getElementById(id);
        const isOpen = panel.classList.contains("show");

        // Cierra todos (comportamiento acordeón)
        document.querySelectorAll(".panel").forEach(p => p.classList.remove("show"));
        document.querySelectorAll(".catBtn").forEach(b => b.setAttribute("aria-expanded","false"));

        // Si estaba cerrado, lo abre
        if(!isOpen){
          panel.classList.add("show");
          btn.setAttribute("aria-expanded","true");
        }
      });
    });
  </script>

  
</body>

</html>
